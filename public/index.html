    <!-- Prevent Google Translate popup -->
    <script>
      (function() {
        // Disable Google Translate immediately
        if (window.google && window.google.translate) {
          window.google.translate.TranslateElement = function() {};
          if (window.google.translate.TranslateElement.prototype) {
            window.google.translate.TranslateElement.prototype = {};
          }
        }
        
        // Function to hide translate elements
        function hideTranslateElements() {
          var elements = [
            'google_translate_element',
            'google_translate_element2',
            'goog-te-banner-frame',
            'goog-te-balloon-frame',
            'goog-te-menu-value',
            'goog-te-menu-frame',
            'goog-te-ftab',
            'goog-te-gadget',
            'goog-te-combo'
          ];
          elements.forEach(function(id) {
            var el = document.getElementById(id);
            if (el) {
              el.style.display = 'none';
              el.style.visibility = 'hidden';
              el.style.height = '0';
              el.style.width = '0';
              el.style.opacity = '0';
            }
          });
          
          // Hide by class
          var classElements = document.getElementsByClassName('skiptranslate');
          for (var i = 0; i < classElements.length; i++) {
            classElements[i].style.display = 'none';
            classElements[i].style.visibility = 'hidden';
          }
          
          // Hide iframes
          var iframes = document.getElementsByTagName('iframe');
          for (var j = 0; j < iframes.length; j++) {
            if (iframes[j].src && iframes[j].src.indexOf('translate.google') !== -1) {
              iframes[j].style.display = 'none';
              iframes[j].style.visibility = 'hidden';
            }
          }
        }
        
        // Run immediately and on DOM ready
        hideTranslateElements();
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', hideTranslateElements);
        }
        
        // Run on page load
        window.addEventListener('load', hideTranslateElements);
        
        // Run periodically to catch dynamically added elements
        setInterval(hideTranslateElements, 500);
        
        // Prevent translation prompt
        document.addEventListener('DOMContentLoaded', function() {
          var html = document.documentElement;
          html.setAttribute('translate', 'no');
          if (html.className.indexOf('notranslate') === -1) {
            html.className = html.className + ' notranslate';
          }
          var body = document.body;
          if (body) {
            body.setAttribute('translate', 'no');
            if (body.className.indexOf('notranslate') === -1) {
              body.className = body.className + ' notranslate';
            }
          }
          
          // Mark root element
          var root = document.getElementById('root');
          if (root) {
            root.setAttribute('translate', 'no');
            root.className = root.className + ' notranslate';
          }
        });
      })();
    </script>
