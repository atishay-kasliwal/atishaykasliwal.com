<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      // SPA deep-link support for static hosts:
      // Redirect /some/path -> /?/some/path so index.html can restore it.
      (function () {
        var l = window.location;
        var path = l.pathname;
        var search = l.search ? l.search.slice(1).replace(/&/g, "~and~") : "";
        var target = "/?/" + path.replace(/^\//, "");
        if (search) target += "&" + search;
        if (l.hash) target += l.hash;
        l.replace(target);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
