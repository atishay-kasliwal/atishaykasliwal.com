<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      /*
       * SPA GitHub Pages redirect script
       * https://github.com/rafgraph/spa-github-pages
       * This script takes the current path and redirects to /?/<path>#<hash>
       * so the SPA can restore the correct route client-side.
       */
      (function() {
        var l = window.location;
        // If served from github.io, consolidate to custom domain with full path
        if (/github\.io$/i.test(l.hostname)) {
          var target = 'https://atishaykasliwal.com' + l.pathname + l.search + l.hash;
          window.location.replace(target);
          return;
        }
        // Otherwise use the standard SPA redirect helper
        var redirect = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?/' + l.pathname.replace(/^\//, '') + l.search + l.hash;
        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
